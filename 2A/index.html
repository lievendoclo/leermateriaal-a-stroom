<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --terracotta: #C1440E; --gold: #D4A017; --oker: #C8923A;

  .label-right { color: rgba(232,220,200,.55); font-size: .78rem; }

  .hero {
    background: var(--darkblue); color: white;

    position: relative; overflow: hidden; flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(212,160,23,0.07) 1px, transparent 1px);
    background-size: 28px 28px; pointer-events: none;
  }
  .hero-kicker {
    font-size: .78rem; font-weight: 700; letter-spacing: .18em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 1rem;
  }
  .hero h1 { font-size: clamp(2.4rem, 5vw, 3.8rem); color: white; margin-bottom: .75rem; }
  .hero-subtitle { font-size: 1.05rem; color: rgba(255,255,255,.55); max-width: 480px; margin: 0 auto 2.5rem; }

  .back-link {
    display: inline-flex; align-items: center; gap: .4rem;
    font-size: .85rem; font-weight: 600; letter-spacing: .06em;
    color: rgba(255,255,255,.5); text-decoration: none;
    border: 1px solid rgba(255,255,255,.2); border-radius: 4px;
    padding: .45rem 1rem; transition: all .15s;
  }
  .back-link:hover { color: var(--gold); border-color: rgba(212,160,23,.5); }

  .site-footer {
    background: var(--darkblue); color: rgba(255,255,255,.4);
    text-align: center; padding: 1.5rem 2rem; font-size: .82rem;
    letter-spacing: .04em;
  }
  .site-footer strong { color: var(--gold); font-weight: 600; }

  @media (max-width: 600px) {
    .site-header { padding: .65rem 1.25rem; }
